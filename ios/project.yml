name: Aevora
options:
  createIntermediateGroups: true
  bundleIdPrefix: com.aevora
settings:
  base:
    SWIFT_VERSION: 6.0
    TARGETED_DEVICE_FAMILY: 1
    SUPPORTS_MACCATALYST: NO
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
targets:
  Aevora:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Aevora
      - path: SharedGlance
      - path: ../content/launch/launch-content.min.v1.json
        buildPhase: resources
      - path: ../content/launch/copy/en/core.v1.json
        buildPhase: resources
      - path: ../shared/tokens/aevora-v1-design-tokens.json
        buildPhase: resources
    dependencies:
      - target: AevoraWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aevora.app
        PRODUCT_NAME: Aevora
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: Aevora/Aevora.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Aevora
        INFOPLIST_KEY_CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - aevora
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    scheme:
      gatherCoverageData: true
      testTargets:
        - AevoraTests
  AevoraTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: AevoraTests
      - path: SharedGlance
    dependencies:
      - target: Aevora
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aevora.appTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Aevora.app/Aevora"
  AevoraWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: AevoraWidgets
      - path: SharedGlance
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aevora.app.widgets
        PRODUCT_NAME: AevoraWidgets
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: AevoraWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: AevoraWidgets/AevoraWidgets.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: NO
