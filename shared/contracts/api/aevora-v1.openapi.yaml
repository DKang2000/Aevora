openapi: 3.1.0
info:
  title: Aevora API
  version: v1
servers:
  - url: https://api.aevora.example.com
paths:
  /v1/auth/guest:
    post:
      summary: Create or resume a guest session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deviceId]
              properties:
                deviceId:
                  type: string
      responses:
        "200":
          description: Guest session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
  /v1/auth/apple:
    post:
      summary: Exchange Apple identity token for an app session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identityToken]
              properties:
                identityToken:
                  type: string
      responses:
        "200":
          description: Registered session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
  /v1/auth/link-account:
    post:
      summary: Link a guest account to a registered account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [guestUserId, identityToken]
              properties:
                guestUserId:
                  type: string
                identityToken:
                  type: string
      responses:
        "200":
          description: Linked session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
  /v1/profile:
    get:
      summary: Fetch profile and avatar snapshot
      responses:
        "200":
          description: Profile snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
    patch:
      summary: Update profile fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                selectedIdentityShellId:
                  type: string
                displayName:
                  type: string
                pronouns:
                  type: [string, "null"]
                selectedGoals:
                  type: array
                  items:
                    type: string
                selectedLifeAreas:
                  type: array
                  items:
                    type: string
                blocker:
                  type: [string, "null"]
                dailyLoad:
                  type: integer
                toneMode:
                  type: string
                  enum: [gentle, balanced, driven]
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
  /v1/avatar:
    patch:
      summary: Update avatar cosmetics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                silhouetteId:
                  type: string
                paletteId:
                  type: string
                accessoryIds:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Updated avatar
          content:
            application/json:
              schema:
                type: object
                required: [avatar]
                properties:
                  avatar:
                    $ref: "#/components/schemas/Avatar"
  /v1/vows:
    get:
      summary: List user vows
      responses:
        "200":
          description: Vow list
          content:
            application/json:
              schema:
                type: object
                required: [vows]
                properties:
                  vows:
                    type: array
                    items:
                      $ref: "#/components/schemas/Vow"
    post:
      summary: Create a new vow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/Vow"
                - type: object
                  required: [title, type, category, target, schedule]
                  properties:
                    schedule:
                      $ref: "#/components/schemas/VowSchedule"
      responses:
        "201":
          description: Created vow
          content:
            application/json:
              schema:
                type: object
                required: [vow]
                properties:
                  vow:
                    $ref: "#/components/schemas/Vow"
  /v1/vows/{vowId}:
    patch:
      summary: Update a vow
      parameters:
        - in: path
          name: vowId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Updated vow
          content:
            application/json:
              schema:
                type: object
                required: [vow]
                properties:
                  vow:
                    $ref: "#/components/schemas/Vow"
  /v1/vows/{vowId}/archive:
    post:
      summary: Archive a vow
      parameters:
        - in: path
          name: vowId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Archived vow
          content:
            application/json:
              schema:
                type: object
                required: [vowId, status]
                properties:
                  vowId:
                    type: string
                  status:
                    type: string
                    enum: [archived]
  /v1/completions:
    post:
      summary: Submit a single completion event
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompletionRequest"
      responses:
        "200":
          description: Completion accepted and reconciled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompletionResponse"
  /v1/sync/operations:
    post:
      summary: Submit queued offline operations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [operations]
              properties:
                operations:
                  type: array
                  items:
                    $ref: "#/components/schemas/QueuedOperation"
      responses:
        "200":
          description: Per-operation reconciliation results
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/SyncResult"
  /v1/progression/snapshot:
    get:
      summary: Fetch current progression snapshot
      responses:
        "200":
          description: Progression snapshot
          content:
            application/json:
              schema:
                type: object
                required: [levelState, emberState, activeChapter]
                properties:
                  levelState:
                    $ref: "#/components/schemas/LevelState"
                  emberState:
                    $ref: "#/components/schemas/EmberState"
                  activeChapter:
                    $ref: "#/components/schemas/ChapterState"
  /v1/world-state:
    get:
      summary: Fetch district and chapter-facing world state
      responses:
        "200":
          description: World snapshot
          content:
            application/json:
              schema:
                type: object
                required: [districtState]
                properties:
                  districtState:
                    $ref: "#/components/schemas/DistrictState"
  /v1/inventory:
    get:
      summary: Fetch inventory items
      responses:
        "200":
          description: Inventory list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/InventoryItem"
  /v1/shop/offers:
    get:
      summary: Fetch current shop offers
      responses:
        "200":
          description: Shop offers
          content:
            application/json:
              schema:
                type: object
                required: [offers]
                properties:
                  offers:
                    type: array
                    items:
                      $ref: "#/components/schemas/ShopOffer"
  /v1/subscription/state:
    get:
      summary: Fetch current entitlement state
      responses:
        "200":
          description: Subscription state
          content:
            application/json:
              schema:
                type: object
                required: [subscriptionState]
                properties:
                  subscriptionState:
                    $ref: "#/components/schemas/SubscriptionState"
  /v1/subscription/trial:
    post:
      summary: Start the 7-day starter trial after the first magical moment
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                source:
                  type: string
      responses:
        "200":
          description: Trial state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionActionResponse"
  /v1/subscription/purchase:
    post:
      summary: Purchase a premium subscription tier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tier]
              properties:
                tier:
                  type: string
                  enum: [premium_monthly, premium_annual]
                source:
                  type: string
      responses:
        "200":
          description: Purchased subscription state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionActionResponse"
  /v1/subscription/restore:
    post:
      summary: Trigger a purchase restore check
      responses:
        "200":
          description: Restore result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionRestoreResponse"
  /v1/subscription/downgrade:
    post:
      summary: Downgrade to the free tier while preserving restore continuity
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Downgraded subscription state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionDowngradeResponse"
  /v1/account:
    get:
      summary: Fetch account continuity and subscription summary
      responses:
        "200":
          description: Account summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSummaryResponse"
    delete:
      summary: Delete the current account and starter-arc runtime state
      responses:
        "200":
          description: Account deletion status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountDeleteResponse"
  /v1/account/export:
    post:
      summary: Prepare an account export snapshot
      responses:
        "200":
          description: Export request summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountExportResponse"
  /v1/glance/state:
    get:
      summary: Fetch the current widget and Live Activity witness snapshot
      responses:
        "200":
          description: Glance state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlanceStateResponse"
  /v1/remote-config:
    get:
      summary: Fetch remote config
      responses:
        "200":
          description: Config payload
          content:
            application/json:
              schema:
                type: object
  /v1/analytics/events:
    post:
      summary: Ingest analytics events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  items:
                    type: object
      responses:
        "202":
          description: Events accepted
components:
  schemas:
    SessionResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          type: object
          required: [id, authMode]
          properties:
            id:
              type: string
            authMode:
              type: string
              enum: [guest, registered]
    ProfileResponse:
      type: object
      required: [profile, avatar, subscriptionState]
      properties:
        profile:
          $ref: "#/components/schemas/Profile"
        avatar:
          $ref: "#/components/schemas/Avatar"
        subscriptionState:
          $ref: "#/components/schemas/SubscriptionState"
    Profile:
      type: object
      required: [id, userId, selectedIdentityShellId, originFamilyId, toneMode, timezone, onboardingState, displayName, selectedGoals, selectedLifeAreas, dailyLoad]
      properties:
        id:
          type: string
        userId:
          type: string
        selectedIdentityShellId:
          type: string
        originFamilyId:
          type: string
        toneMode:
          type: string
          enum: [gentle, balanced, driven]
        timezone:
          type: string
        onboardingState:
          type: string
          enum: [not_started, in_progress, completed]
        displayName:
          type: string
        pronouns:
          type: [string, "null"]
        selectedGoals:
          type: array
          items:
            type: string
        selectedLifeAreas:
          type: array
          items:
            type: string
        blocker:
          type: [string, "null"]
        dailyLoad:
          type: integer
    Avatar:
      type: object
      required: [id, userId, silhouetteId, paletteId, accessoryIds]
      properties:
        id:
          type: string
        userId:
          type: string
        silhouetteId:
          type: string
        paletteId:
          type: string
        accessoryIds:
          type: array
          items:
            type: string
    Vow:
      type: object
      required: [id, userId, title, type, category, status, difficulty, target]
      properties:
        id:
          type: string
        userId:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [binary, count, duration]
        category:
          type: string
        status:
          type: string
          enum: [draft, active, archived]
        difficulty:
          type: string
          enum: [gentle, standard, stretch]
        target:
          type: object
    VowSchedule:
      type: object
      required: [cadence, activeWeekdays]
      properties:
        cadence:
          type: string
        activeWeekdays:
          type: array
          items:
            type: string
        reminderLocalTime:
          type: [string, "null"]
    CompletionRequest:
      type: object
      required: [clientRequestId, vowId, localDate, source, progressState]
      properties:
        clientRequestId:
          type: string
        vowId:
          type: string
        localDate:
          type: string
          format: date
        source:
          type: string
          enum: [manual, healthkit]
        progressState:
          type: string
          enum: [partial, complete]
        quantity:
          type: [number, "null"]
        durationMinutes:
          type: [number, "null"]
    CompletionResponse:
      type: object
      required: [completionEvent, rewards, reconciliation]
      properties:
        completionEvent:
          type: object
        rewards:
          type: array
          items:
            type: object
        reconciliation:
          type: object
          required: [status]
          properties:
            status:
              type: string
              enum: [applied, duplicate, conflict]
    QueuedOperation:
      type: object
      required: [clientRequestId, operationType, payload]
      properties:
        clientRequestId:
          type: string
        operationType:
          type: string
          enum: [vow_create, vow_update, vow_archive, completion_submit]
        payload:
          type: object
    SyncResult:
      type: object
      required: [clientRequestId, status]
      properties:
        clientRequestId:
          type: string
        status:
          type: string
          enum: [applied, duplicate, rejected, retry_later]
        serverSnapshot:
          type: object
    LevelState:
      type: object
      required: [rank, currentRankResonance, lifetimeResonance]
      properties:
        rank:
          type: integer
        currentRankResonance:
          type: integer
        lifetimeResonance:
          type: integer
    EmberState:
      type: object
      required: [availableEmbers, heat]
      properties:
        availableEmbers:
          type: integer
        heat:
          type: integer
    ChapterState:
      type: object
      required: [chapterId, status, progressPercent]
      properties:
        chapterId:
          type: string
        status:
          type: string
        progressPercent:
          type: number
    DistrictState:
      type: object
      required: [districtId, restorationStage, problemTemplateId]
      properties:
        districtId:
          type: string
        restorationStage:
          type: string
        problemTemplateId:
          type: string
    InventoryItem:
      type: object
      required: [id, itemDefinitionId, quantity, bucket, rarity]
      properties:
        id:
          type: string
        itemDefinitionId:
          type: string
        quantity:
          type: integer
        bucket:
          type: string
        rarity:
          type: string
    ShopOffer:
      type: object
      required: [id, itemDefinitionId, priceGold, entitlementGate]
      properties:
        id:
          type: string
        itemDefinitionId:
          type: string
        priceGold:
          type: integer
        entitlementGate:
          type: string
    SubscriptionState:
      type: object
      required: [id, tier, billingState, trialEligible]
      properties:
        id:
          type: string
        tier:
          type: string
          enum: [free, trial, premium_monthly, premium_annual]
        billingState:
          type: string
          enum: [active, grace_period, billing_retry, expired]
        trialEligible:
          type: boolean
        expiresAt:
          type: [string, "null"]
        restoreTier:
          type: [string, "null"]
          enum: [free, trial, premium_monthly, premium_annual, null]
    SubscriptionActionResponse:
      type: object
      required: [subscriptionState, source]
      properties:
        subscriptionState:
          $ref: "#/components/schemas/SubscriptionState"
        source:
          type: string
    SubscriptionRestoreResponse:
      type: object
      required: [subscriptionState, restored]
      properties:
        subscriptionState:
          $ref: "#/components/schemas/SubscriptionState"
        restored:
          type: boolean
    SubscriptionDowngradeResponse:
      type: object
      required: [subscriptionState, reason]
      properties:
        subscriptionState:
          $ref: "#/components/schemas/SubscriptionState"
        reason:
          type: string
    AccountSummaryResponse:
      type: object
      required: [account, subscriptionState]
      properties:
        account:
          type: object
          required: [userId, authMode, selectedIdentityShellId, completionDayCount, activeVowCount]
          properties:
            userId:
              type: string
            authMode:
              type: string
              enum: [guest, registered]
            selectedIdentityShellId:
              type: string
            completionDayCount:
              type: integer
            activeVowCount:
              type: integer
        subscriptionState:
          $ref: "#/components/schemas/SubscriptionState"
    AccountExportResponse:
      type: object
      required: [exportRequest, summary]
      properties:
        exportRequest:
          type: object
          required: [id, status, generatedAt]
          properties:
            id:
              type: string
            status:
              type: string
              enum: [prepared]
            generatedAt:
              type: string
              format: date-time
        summary:
          type: object
          required: [userId, authMode, activeVows, completionDayCount, subscriptionTier]
          properties:
            userId:
              type: string
            authMode:
              type: string
              enum: [guest, registered]
            activeVows:
              type: integer
            completionDayCount:
              type: integer
            subscriptionTier:
              type: string
              enum: [free, trial, premium_monthly, premium_annual]
    AccountDeleteResponse:
      type: object
      required: [status, userId]
      properties:
        status:
          type: string
          enum: [deleted]
        userId:
          type: string
    GlanceStateResponse:
      type: object
      required: [todaySnapshot, liveActivitySnapshot]
      properties:
        todaySnapshot:
          $ref: "#/components/schemas/TodayGlanceSnapshot"
        liveActivitySnapshot:
          $ref: "#/components/schemas/LiveActivityGlanceSnapshot"
    TodayGlanceSnapshot:
      type: object
      required: [activeVowCount, completedVowCount, chapterId, chapterDay, districtStage, topChainLength]
      properties:
        activeVowCount:
          type: integer
        completedVowCount:
          type: integer
        chapterId:
          type: string
        chapterDay:
          type: integer
        districtStage:
          type: string
        topChainLength:
          type: integer
    LiveActivityGlanceSnapshot:
      type: object
      required: [enabled, districtStage, progressPercent]
      properties:
        enabled:
          type: boolean
        districtStage:
          type: string
        progressPercent:
          type: integer
