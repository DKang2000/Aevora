openapi: 3.1.0
info:
  title: Aevora API
  version: v1
servers:
  - url: https://api.aevora.example.com
paths:
  /v1/auth/guest:
    post:
      summary: Create or resume a guest session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deviceId]
              properties:
                deviceId:
                  type: string
      responses:
        "200":
          description: Guest session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
  /v1/auth/apple:
    post:
      summary: Exchange Apple identity token for an app session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identityToken]
              properties:
                identityToken:
                  type: string
      responses:
        "200":
          description: Registered session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
  /v1/auth/link-account:
    post:
      summary: Link a guest account to a registered account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [guestUserId, identityToken]
              properties:
                guestUserId:
                  type: string
                identityToken:
                  type: string
      responses:
        "200":
          description: Linked session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
  /v1/profile:
    get:
      summary: Fetch profile and avatar snapshot
      responses:
        "200":
          description: Profile snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
    patch:
      summary: Update profile fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                selectedIdentityShellId:
                  type: string
                displayName:
                  type: string
                pronouns:
                  type: [string, "null"]
                selectedGoals:
                  type: array
                  items:
                    type: string
                selectedLifeAreas:
                  type: array
                  items:
                    type: string
                blocker:
                  type: [string, "null"]
                dailyLoad:
                  type: integer
                toneMode:
                  type: string
                  enum: [gentle, balanced, driven]
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
  /v1/avatar:
    patch:
      summary: Update avatar cosmetics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                silhouetteId:
                  type: string
                paletteId:
                  type: string
                accessoryIds:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Updated avatar
          content:
            application/json:
              schema:
                type: object
                required: [avatar]
                properties:
                  avatar:
                    $ref: "#/components/schemas/Avatar"
  /v1/vows:
    get:
      summary: List user vows
      responses:
        "200":
          description: Vow list
          content:
            application/json:
              schema:
                type: object
                required: [vows]
                properties:
                  vows:
                    type: array
                    items:
                      $ref: "#/components/schemas/Vow"
    post:
      summary: Create a new vow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/Vow"
                - type: object
                  required: [title, type, category, target, schedule]
                  properties:
                    schedule:
                      $ref: "#/components/schemas/VowSchedule"
      responses:
        "201":
          description: Created vow
          content:
            application/json:
              schema:
                type: object
                required: [vow]
                properties:
                  vow:
                    $ref: "#/components/schemas/Vow"
  /v1/vows/{vowId}:
    patch:
      summary: Update a vow
      parameters:
        - in: path
          name: vowId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Updated vow
          content:
            application/json:
              schema:
                type: object
                required: [vow]
                properties:
                  vow:
                    $ref: "#/components/schemas/Vow"
  /v1/vows/{vowId}/archive:
    post:
      summary: Archive a vow
      parameters:
        - in: path
          name: vowId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Archived vow
          content:
            application/json:
              schema:
                type: object
                required: [vowId, status]
                properties:
                  vowId:
                    type: string
                  status:
                    type: string
                    enum: [archived]
  /v1/completions:
    post:
      summary: Submit a single completion event
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompletionRequest"
      responses:
        "200":
          description: Completion accepted and reconciled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompletionResponse"
  /v1/sync/operations:
    post:
      summary: Submit queued offline operations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [operations]
              properties:
                operations:
                  type: array
                  items:
                    $ref: "#/components/schemas/QueuedOperation"
      responses:
        "200":
          description: Per-operation reconciliation results
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/SyncResult"
  /v1/progression/snapshot:
    get:
      summary: Fetch current progression snapshot
      responses:
        "200":
          description: Progression snapshot
          content:
            application/json:
              schema:
                type: object
                required: [levelState, emberState, activeChapter]
                properties:
                  levelState:
                    $ref: "#/components/schemas/LevelState"
                  emberState:
                    $ref: "#/components/schemas/EmberState"
                  activeChapter:
                    $ref: "#/components/schemas/ChapterState"
  /v1/world-state:
    get:
      summary: Fetch district and chapter-facing world state
      responses:
        "200":
          description: World snapshot
          content:
            application/json:
              schema:
                type: object
                required: [districtState]
                properties:
                  districtState:
                    $ref: "#/components/schemas/DistrictState"
  /v1/inventory:
    get:
      summary: Fetch inventory items
      responses:
        "200":
          description: Inventory list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/InventoryItem"
  /v1/shop/offers:
    get:
      summary: Fetch current shop offers
      responses:
        "200":
          description: Shop offers
          content:
            application/json:
              schema:
                type: object
                required: [offers]
                properties:
                  offers:
                    type: array
                    items:
                      $ref: "#/components/schemas/ShopOffer"
  /v1/shop/offers/{offerId}/purchase:
    post:
      summary: Purchase a curated shop offer
      parameters:
        - in: path
          name: offerId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShopPurchaseRequest"
      responses:
        "200":
          description: Shop purchase completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopPurchaseResponse"
  /v1/notifications/plan:
    get:
      summary: Fetch the current sparse reminder and witness notification plan
      responses:
        "200":
          description: Notification plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPlanResponse"
  /v1/verified-inputs/completions:
    post:
      summary: Ingest one verified completion intent from a narrow source such as HealthKit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifiedCompletionRequest"
      responses:
        "200":
          description: Verified completion import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifiedCompletionResponse"
  /v1/subscription/state:
    get:
      summary: Fetch current entitlement state
      responses:
        "200":
          description: Subscription state
          content:
            application/json:
              schema:
                type: object
                required: [subscriptionState]
                properties:
                  subscriptionState:
                    $ref: "#/components/schemas/SubscriptionState"
  /v1/subscription/trial:
    post:
      summary: Start the 7-day starter trial after the first magical moment
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                source:
                  type: string
      responses:
        "200":
          description: Trial state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionActionResponse"
  /v1/subscription/purchase:
    post:
      summary: Purchase a premium subscription tier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tier]
              properties:
                tier:
                  type: string
                  enum: [premium_monthly, premium_annual]
                source:
                  type: string
      responses:
        "200":
          description: Purchased subscription state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionActionResponse"
  /v1/subscription/restore:
    post:
      summary: Trigger a purchase restore check
      responses:
        "200":
          description: Restore result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionRestoreResponse"
  /v1/subscription/downgrade:
    post:
      summary: Downgrade to the free tier while preserving restore continuity
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Downgraded subscription state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionDowngradeResponse"
  /v1/subscription/refresh:
    post:
      summary: Reconcile local StoreKit transaction context with the current server-authoritative entitlement state
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionRefreshRequest"
      responses:
        "200":
          description: Refreshed subscription state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionRefreshResponse"
  /v1/subscription/storekit/notifications:
    post:
      summary: Accept a StoreKit server notification and update entitlement state deterministically
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreKitNotificationRequest"
      responses:
        "200":
          description: StoreKit notification accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreKitNotificationResponse"
  /v1/account:
    get:
      summary: Fetch account continuity and subscription summary
      responses:
        "200":
          description: Account summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSummaryResponse"
    delete:
      summary: Delete the current account and starter-arc runtime state
      responses:
        "200":
          description: Account deletion status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountDeleteResponse"
  /v1/account/export:
    post:
      summary: Prepare an account export snapshot
      responses:
        "200":
          description: Export request summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountExportResponse"
  /v1/admin/runtime-config/releases/current:
    get:
      summary: Fetch the current remote-config release state for operators
      responses:
        "200":
          description: Remote-config release state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeConfigReleaseStateResponse"
  /v1/admin/runtime-config/releases/promote:
    post:
      summary: Promote a validated remote-config candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPromoteRuntimeConfigRequest"
      responses:
        "201":
          description: Promoted remote-config release
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeConfigPromotionResponse"
  /v1/admin/content/releases/current:
    get:
      summary: Fetch the current launch-content release state for operators
      responses:
        "200":
          description: Content release state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentReleaseStateResponse"
  /v1/admin/content/releases/promote:
    post:
      summary: Promote a validated launch-content candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPromoteContentRequest"
      responses:
        "201":
          description: Promoted content release
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPromotionResponse"
  /v1/admin/assets/releases/current:
    get:
      summary: Fetch the current asset-manifest release state for operators
      responses:
        "200":
          description: Asset-manifest release state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetReleaseStateResponse"
  /v1/admin/assets/releases/promote:
    post:
      summary: Promote a validated asset manifest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPromoteAssetManifestRequest"
      responses:
        "201":
          description: Promoted asset release
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetPromotionResponse"
  /v1/admin/accounts/{userId}:
    get:
      summary: Fetch support-safe account state for an operator
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Support-safe account summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAccountSummaryResponse"
  /v1/admin/accounts/{userId}/export:
    post:
      summary: Prepare a support-safe export for an operator
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Export request summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountExportResponse"
  /v1/glance/state:
    get:
      summary: Fetch the current widget and Live Activity witness snapshot
      responses:
        "200":
          description: Glance state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlanceStateResponse"
  /v1/remote-config:
    get:
      summary: Fetch remote config
      responses:
        "200":
          description: Config payload
          content:
            application/json:
              schema:
                type: object
  /v1/analytics/events:
    post:
      summary: Ingest analytics events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  items:
                    type: object
      responses:
        "202":
          description: Events accepted
components:
  schemas:
    SessionResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          type: object
          required: [id, authMode]
          properties:
            id:
              type: string
            authMode:
              type: string
              enum: [guest, registered]
    ProfileResponse:
      type: object
      required: [profile, avatar, subscriptionState]
      properties:
        profile:
          $ref: "#/components/schemas/Profile"
        avatar:
          $ref: "#/components/schemas/Avatar"
        subscriptionState:
          $ref: "#/components/schemas/SubscriptionState"
    Profile:
      type: object
      required: [id, userId, selectedIdentityShellId, originFamilyId, toneMode, timezone, onboardingState, displayName, selectedGoals, selectedLifeAreas, dailyLoad]
      properties:
        id:
          type: string
        userId:
          type: string
        selectedIdentityShellId:
          type: string
        originFamilyId:
          type: string
        toneMode:
          type: string
          enum: [gentle, balanced, driven]
        timezone:
          type: string
        onboardingState:
          type: string
          enum: [not_started, in_progress, completed]
        displayName:
          type: string
        pronouns:
          type: [string, "null"]
        selectedGoals:
          type: array
          items:
            type: string
        selectedLifeAreas:
          type: array
          items:
            type: string
        blocker:
          type: [string, "null"]
        dailyLoad:
          type: integer
    Avatar:
      type: object
      required: [id, userId, silhouetteId, paletteId, accessoryIds]
      properties:
        id:
          type: string
        userId:
          type: string
        silhouetteId:
          type: string
        paletteId:
          type: string
        accessoryIds:
          type: array
          items:
            type: string
    Vow:
      type: object
      required: [id, userId, title, type, category, status, difficulty, target]
      properties:
        id:
          type: string
        userId:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [binary, count, duration]
        category:
          type: string
        status:
          type: string
          enum: [draft, active, archived]
        difficulty:
          type: string
          enum: [gentle, standard, stretch]
        target:
          type: object
    VowSchedule:
      type: object
      required: [cadence, activeWeekdays]
      properties:
        cadence:
          type: string
        activeWeekdays:
          type: array
          items:
            type: string
        reminderLocalTime:
          type: [string, "null"]
    CompletionRequest:
      type: object
      required: [clientRequestId, vowId, localDate, source, progressState]
      properties:
        clientRequestId:
          type: string
        vowId:
          type: string
        localDate:
          type: string
          format: date
        source:
          type: string
          enum: [manual, healthkit]
        progressState:
          type: string
          enum: [partial, complete]
        quantity:
          type: [number, "null"]
        durationMinutes:
          type: [number, "null"]
    CompletionResponse:
      type: object
      required: [completionEvent, rewards, reconciliation]
      properties:
        completionEvent:
          type: object
        rewards:
          type: array
          items:
            type: object
        reconciliation:
          type: object
          required: [status]
          properties:
            status:
              type: string
              enum: [applied, duplicate, conflict]
    QueuedOperation:
      type: object
      required: [clientRequestId, operationType, payload]
      properties:
        clientRequestId:
          type: string
        operationType:
          type: string
          enum: [vow_create, vow_update, vow_archive, completion_submit]
        payload:
          type: object
    SyncResult:
      type: object
      required: [clientRequestId, status]
      properties:
        clientRequestId:
          type: string
        status:
          type: string
          enum: [applied, duplicate, rejected, retry_later]
        serverSnapshot:
          type: object
    LevelState:
      type: object
      required: [rank, currentRankResonance, lifetimeResonance]
      properties:
        rank:
          type: integer
        currentRankResonance:
          type: integer
        lifetimeResonance:
          type: integer
    EmberState:
      type: object
      required: [availableEmbers, heat]
      properties:
        availableEmbers:
          type: integer
        heat:
          type: integer
    ChapterState:
      type: object
      required: [chapterId, status, progressPercent, currentDay, activeQuestId, entitlementStatus, accessibleDayCap]
      properties:
        chapterId:
          type: string
        status:
          type: string
        progressPercent:
          type: number
        currentDay:
          type: integer
        activeQuestId:
          type: string
        entitlementStatus:
          type: string
        accessibleDayCap:
          type: integer
    DistrictState:
      type: object
      required: [districtId, restorationStage, problemTemplateId, visibleNpcIds, currentMomentId, worldChangeKey, problemState, problemProgressPercent]
      properties:
        districtId:
          type: string
        restorationStage:
          type: string
        problemTemplateId:
          type: string
        visibleNpcIds:
          type: array
          items:
            type: string
        currentMomentId:
          type: string
        worldChangeKey:
          type: string
        problemState:
          type: string
        problemProgressPercent:
          type: integer
    InventoryItem:
      type: object
      required: [id, itemDefinitionId, quantity, bucket, rarity, status, slot, earnedFrom]
      properties:
        id:
          type: string
        itemDefinitionId:
          type: string
        quantity:
          type: integer
        bucket:
          type: string
        rarity:
          type: string
        status:
          type: string
        slot:
          type: string
        earnedFrom:
          type: string
    ShopOffer:
      type: object
      required: [id, itemDefinitionId, priceGold, entitlementGate, vendorNpcId, stockLimit, chapterGate, repeatable, canAfford, isOwned, isLocked, remainingStock]
      properties:
        id:
          type: string
        itemDefinitionId:
          type: string
        priceGold:
          type: integer
        entitlementGate:
          type: string
        vendorNpcId:
          type: string
        stockLimit:
          type: integer
        chapterGate:
          type: string
        repeatable:
          type: boolean
        canAfford:
          type: boolean
        isOwned:
          type: boolean
        isLocked:
          type: boolean
        remainingStock:
          type: integer
    ShopPurchaseRequest:
      type: object
      properties:
        source:
          type: string
    ShopPurchaseResponse:
      type: object
      required: [purchaseId, offerId, item, remainingGold]
      properties:
        purchaseId:
          type: string
        offerId:
          type: string
        item:
          $ref: "#/components/schemas/InventoryItem"
        remainingGold:
          type: integer
        source:
          type: string
    NotificationPlanItem:
      type: object
      required: [id, kind, title, body, deliveryHourLocal, deliveryMinuteLocal, destination]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [vow_reminder, witness_prompt, streak_risk, chapter_ready]
        title:
          type: string
        body:
          type: string
        deliveryHourLocal:
          type: integer
        deliveryMinuteLocal:
          type: integer
        destination:
          type: string
          enum: [today, world, quest_journal]
        vowId:
          type: [string, "null"]
    NotificationPlanResponse:
      type: object
      required: [generatedAt, plan]
      properties:
        generatedAt:
          type: string
          format: date-time
        plan:
          type: array
          items:
            $ref: "#/components/schemas/NotificationPlanItem"
    SourceConnection:
      type: object
      required: [sourceType, authorizationState, supportedDomains]
      properties:
        sourceType:
          type: string
          enum: [healthkit]
        authorizationState:
          type: string
          enum: [not_requested, requested, granted, denied]
        supportedDomains:
          type: array
          items:
            type: string
            enum: [workout, steps, sleep]
        lastSyncAt:
          type: [string, "null"]
          format: date-time
    VerifiedCompletionRequest:
      type: object
      required: [sourceEventId, sourceType, sourceDomain, vowId, localDate]
      properties:
        sourceEventId:
          type: string
        sourceType:
          type: string
          enum: [healthkit]
        sourceDomain:
          type: string
          enum: [workout, steps, sleep]
        vowId:
          type: string
        localDate:
          type: string
          format: date
        progressState:
          type: string
          enum: [partial, complete]
        quantity:
          type: [integer, "null"]
        durationMinutes:
          type: [integer, "null"]
    VerifiedCompletionResponse:
      type: object
      required: [importId, completion, sourceConnection, reconciliation]
      properties:
        importId:
          type: string
        completion:
          $ref: "#/components/schemas/CompletionResponse"
        sourceConnection:
