version: v1
commonProperties:
  - event_name
  - event_version
  - occurred_at_utc
  - local_date
  - session_id
  - surface
  - app_build
  - platform
  - experiment_assignments
groups:
  app_lifecycle:
    events:
      - app_installed
      - app_opened
      - session_started
      - session_ended
  onboarding:
    events:
      - onboarding_started
      - onboarding_step_viewed
      - onboarding_step_completed
      - origin_family_selected
      - identity_selected
      - avatar_created
      - starter_vow_recommended
      - starter_vow_accepted
      - starter_vow_edited
      - onboarding_completed
      - first_magical_moment_viewed
  vow_completion:
    events:
      - vow_created
      - vow_edited
      - vow_archived
      - vow_deleted
      - reminder_enabled
      - vow_started
      - vow_progress_updated
      - vow_completed
      - day_completed_first_vow
      - all_planned_vows_completed
      - vow_missed
      - vow_rekindled
  progression_world:
    events:
      - resonance_awarded
      - gold_awarded
      - level_up
      - witness_mark_earned
      - world_scene_opened
      - npc_interaction_started
      - npc_dialogue_completed
      - district_progressed
      - problem_damage_dealt
      - chapter_started
      - chapter_milestone_reached
      - chapter_completed
  commerce_surfaces:
    events:
      - reward_chest_opened
      - item_awarded
      - shop_opened
      - shop_item_viewed
      - shop_purchase_completed
      - widget_viewed
      - widget_tapped
      - live_activity_started
      - live_activity_tapped
      - shortcut_invoked
      - notification_prompt_viewed
      - notification_permission_result
      - notification_sent
      - notification_opened
      - healthkit_prompt_viewed
      - healthkit_permission_result
      - verified_completion_imported
      - paywall_viewed
      - trial_started
      - purchase_started
      - purchase_completed
      - purchase_failed
      - subscription_restored
      - subscription_renewed
      - subscription_canceled
      - subscription_expired
privacyRules:
  - no_freeform_journaling_text
  - no_raw_healthkit_payloads
  - no_mental_health_inference
