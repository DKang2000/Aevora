name: TestFlight Distribution

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: Marketing version to stamp into the archive
        required: true
        default: "1.0.0"
      release_channel:
        description: Target tester group channel
        required: true
        default: internal
        type: choice
        options:
          - internal
          - beta

jobs:
  archive-and-upload:
    runs-on: macos-15
    environment: production
    env:
      PROJECT_SPEC: ios/project.yml
      PROJECT_PATH: ios/Aevora.xcodeproj
      SCHEME: Aevora
      ARCHIVE_PATH: ${{ runner.temp }}/Aevora.xcarchive
      EXPORT_PATH: ${{ runner.temp }}/export
    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          IOS_DISTRIBUTION_CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          IOS_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          for name in \
            APP_STORE_CONNECT_ISSUER_ID \
            APP_STORE_CONNECT_KEY_ID \
            APP_STORE_CONNECT_PRIVATE_KEY \
            IOS_DISTRIBUTION_CERT_BASE64 \
            IOS_DISTRIBUTION_CERT_PASSWORD \
            IOS_PROVISIONING_PROFILE_BASE64 \
            KEYCHAIN_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "Missing secret: $name" >&2
              exit 1
            fi
          done

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate --spec "$PROJECT_SPEC"

      - name: Configure signing assets
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          IOS_DISTRIBUTION_CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          IOS_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/aevora_distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/aevora.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/aevora-signing.keychain-db"
          APP_STORE_KEY_DIR="$HOME/.appstoreconnect/private_keys"
          echo "$IOS_DISTRIBUTION_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$APP_STORE_KEY_DIR"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$APP_STORE_KEY_DIR/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_DISTRIBUTION_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Archive app
        run: |
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -archivePath "$ARCHIVE_PATH" \
            -destination generic/platform=iOS \
            MARKETING_VERSION='${{ inputs.marketing_version }}' \
            CURRENT_PROJECT_VERSION='${{ github.run_number }}'

      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/exportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist"

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$EXPORT_PATH/Aevora.ipa" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Summarize release channel
        run: echo "Uploaded build ${{ github.run_number }} for ${{ inputs.release_channel }} testers."
