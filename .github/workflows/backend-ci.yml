name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - "shared/contracts/**"
      - "content/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: [ main ]
    paths:
      - "backend/**"
      - "shared/contracts/**"
      - "content/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://aevora:aevora@localhost:5432/aevora_ci?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Typecheck
        run: corepack pnpm typecheck
      - name: Test
        run: corepack pnpm test
      - name: Validate Prisma schema
        run: corepack pnpm --filter @aevora/api prisma:validate
      - name: Validate analytics fixtures
        run: corepack pnpm --filter @aevora/api validate:analytics
      - name: Validate demo datasets
        run: corepack pnpm --filter @aevora/api validate:datasets
